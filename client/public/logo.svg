<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">

<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3.5" result="coloredBlur"></feGaussianBlur>
    <feMerge>
      <feMergeNode in="coloredBlur"></feMergeNode>
      <feMergeNode in="SourceGraphic"></feMergeNode>
    </feMerge>
  </filter>
</defs>

<!-- Hexagon -->
<polygon points="50,40 90,20 130,40 130,90 90,110 50,90" stroke="#00FFC6" stroke-width="4" fill="none" filter="url(#glow)"></polygon>

<!-- crossed lines -->
<line x1="65" y1="35" x2="115" y2="95" stroke="#00FFC6" stroke-width="4"></line>
<line x1="115" y1="35" x2="65" y2="95" stroke="#FF3C7A" stroke-width="4"></line>

<!-- IEEE -->
<text x="160" y="55" fill="#6FD3FF" font-size="26" font-family="monospace" letter-spacing="8">
IEEE
</text>

<!-- Main title -->
<text x="160" y="95" fill="#4FC3F7" font-size="46" font-family="monospace" font-weight="bold" filter="url(#glow)">
CS MAFIA NIGHT
</text>

<!-- subtitle -->
<text x="160" y="125" fill="#8FAFC0" font-size="18" font-family="monospace" letter-spacing="6">
HACKERS VS DEVELOPERS
</text>

</svg>