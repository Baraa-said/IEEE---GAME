<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="400" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00bbff"/>
      <stop offset="100%" stop-color="#aa66ff"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background shield shape -->
  <path d="M50 15 L75 5 L100 15 L100 55 L75 70 L50 55 Z" fill="#0a0e17" stroke="url(#glow)" stroke-width="2" filter="url(#neon)"/>
  
  <!-- Binary streams inside shield -->
  <text x="58" y="28" fill="#00ff8830" font-family="monospace" font-size="7">010</text>
  <text x="72" y="38" fill="#00ff8830" font-family="monospace" font-size="7">110</text>
  <text x="62" y="48" fill="#00ff8830" font-family="monospace" font-size="7">101</text>
  <text x="75" y="58" fill="#00ff8830" font-family="monospace" font-size="7">011</text>
  
  <!-- Crossed swords icon in shield -->
  <line x1="62" y1="22" x2="88" y2="58" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" filter="url(#neon)"/>
  <line x1="88" y1="22" x2="62" y2="58" stroke="#ff3366" stroke-width="2.5" stroke-linecap="round" filter="url(#neon)"/>
  <!-- Sword handles -->
  <line x1="59" y1="19" x2="65" y2="25" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>
  <line x1="91" y1="19" x2="85" y2="25" stroke="#ff3366" stroke-width="3" stroke-linecap="round"/>
  
  <!-- IEEE text -->
  <text x="115" y="35" font-family="monospace" font-weight="900" font-size="18" fill="#00bbff" letter-spacing="4" filter="url(#neon)">IEEE</text>
  
  <!-- CODE WARS main text -->
  <text x="115" y="62" font-family="monospace" font-weight="900" font-size="30" fill="url(#glow)" letter-spacing="3" filter="url(#neonStrong)">CODE WARS</text>
  
  <!-- Tagline -->
  <text x="115" y="80" font-family="monospace" font-weight="400" font-size="10" fill="#64748b" letter-spacing="5">HACKERS VS DEVELOPERS</text>
  
  <!-- Decorative terminal cursor -->
  <rect x="348" y="48" width="14" height="22" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Circuit lines -->
  <line x1="115" y1="88" x2="370" y2="88" stroke="#1e293b" stroke-width="1"/>
  <circle cx="135" cy="88" r="2" fill="#00ff88" opacity="0.5"/>
  <circle cx="200" cy="88" r="2" fill="#00bbff" opacity="0.5"/>
  <circle cx="280" cy="88" r="2" fill="#aa66ff" opacity="0.5"/>
  <circle cx="350" cy="88" r="2" fill="#ff3366" opacity="0.5"/>
</svg>
